<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      .terminal-text { font-family: 'JetBrains Mono', 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 13px; fill: #abb2bf; line-height: 1.6; }
      .prompt-path { fill: #61afef; font-weight: bold; }
      .prompt-arrow { fill: #c678dd; font-weight: bold; }
      .cmd { fill: #ffffff; font-weight: 500; }
      
      .tag-info { fill: #61afef; font-weight: bold; }
      .tag-think { fill: #c678dd; font-weight: bold; }
      .tag-plan { fill: #e5c07b; font-weight: bold; }
      .tag-exec { fill: #56b6c2; font-weight: bold; }
      .tag-check { fill: #98c379; font-weight: bold; }
      .tag-fix { fill: #ff5f56; font-weight: bold; }
      
      .text-main { fill: #abb2bf; }
      .text-dim { fill: #7f848e; }
      .text-dimmer { fill: #5c6370; }
      .text-success { fill: #98c379; }
      .text-highlight { fill: #e5c07b; }
      .text-file { fill: #56b6c2; text-decoration: underline; }
      
      .cursor { animation: blink 1s step-end infinite; fill: #abb2bf; }
      @keyframes blink { 50% { opacity: 0; } }
      
      .box-bg { fill: #2c313a; opacity: 0.5; }
    </style>
  </defs>

  <!-- Window Frame -->
  <rect x="0" y="0" width="900" height="640" rx="12" ry="12" fill="#282c34" />
  
  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="42" rx="12" ry="12" fill="#21252b" />
  <rect x="0" y="30" width="900" height="12" fill="#21252b" /> <!-- Square off bottom corners -->
  
  <!-- Window Controls -->
  <circle cx="24" cy="21" r="6" fill="#ff5f56" />
  <circle cx="48" cy="21" r="6" fill="#ffbd2e" />
  <circle cx="72" cy="21" r="6" fill="#27c93f" />

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#9da5b4">zene — 100x36</text>

  <!-- Terminal Content Area -->
  <g transform="translate(24, 70)">
    
    <!-- Command Input -->
    <text x="0" y="0" class="terminal-text">
      <tspan class="prompt-path">~/dev/workspace</tspan> <tspan class="prompt-arrow">❯</tspan> <tspan class="cmd">zene run "Build a multi-file FastAPI Todo app with SQLite"</tspan>
    </text>

    <!-- Spacer -->
    
    <!-- System Init -->
    <text x="0" y="32" class="terminal-text">
      <tspan class="tag-info"> INFO </tspan> <tspan class="text-dim">Initializing Zene Engine v0.4.5...</tspan>
    </text>
    <text x="0" y="52" class="terminal-text">
      <tspan class="tag-info"> INFO </tspan> <tspan class="text-dim">Loaded context: </tspan><tspan class="text-dimmer">0 files, 0 tokens</tspan>
    </text>

    <!-- Section: Analysis -->
    <text x="0" y="90" class="terminal-text">
      <tspan class="tag-think"> THINK </tspan> <tspan class="text-main">Analyzing requirements for modular architecture...</tspan>
    </text>
    <text x="0" y="112" class="terminal-text">
      <tspan class="text-dim">       │ </tspan><tspan class="text-dimmer">Identifying core components: Database, Models, Schemas, CRUD, API.</tspan>
    </text>
    <text x="0" y="132" class="terminal-text">
      <tspan class="text-dim">       │ </tspan><tspan class="text-dimmer">Determining dependency order: DB -> Models -> Schemas -> CRUD -> Main.</tspan>
    </text>
    <text x="0" y="152" class="terminal-text">
      <tspan class="text-dim">       └ </tspan><tspan class="text-dimmer">Selected stack: FastAPI, SQLAlchemy (SQLite), Pydantic.</tspan>
    </text>

    <!-- Section: Planning -->
    <text x="0" y="190" class="terminal-text">
      <tspan class="tag-plan"> PLAN </tspan> <tspan class="text-main">Execution Strategy Generated:</tspan>
    </text>
    <text x="0" y="212" class="terminal-text">
      <tspan class="text-dim">       1. </tspan><tspan class="text-highlight">Setup Database</tspan> <tspan class="text-dim">...... Create `database.py` with `SessionLocal`</tspan>
    </text>
    <text x="0" y="232" class="terminal-text">
      <tspan class="text-dim">       2. </tspan><tspan class="text-highlight">Define Models</tspan> <tspan class="text-dim">....... Create `models.py` with `Todo` table</tspan>
    </text>
    <text x="0" y="252" class="terminal-text">
      <tspan class="text-dim">       3. </tspan><tspan class="text-highlight">Define Schemas</tspan> <tspan class="text-dim">...... Create `schemas.py` for Pydantic validation</tspan>
    </text>
    <text x="0" y="272" class="terminal-text">
      <tspan class="text-dim">       4. </tspan><tspan class="text-highlight">Implement Logic</tspan> <tspan class="text-dim">..... Create `crud.py` for DB operations</tspan>
    </text>
    <text x="0" y="292" class="terminal-text">
      <tspan class="text-dim">       5. </tspan><tspan class="text-highlight">Expose API</tspan> <tspan class="text-dim">.......... Create `main.py` with FastAPI endpoints</tspan>
    </text>

    <!-- Section: Execution -->
    <text x="0" y="330" class="terminal-text">
      <tspan class="tag-exec"> EXEC </tspan> <tspan class="text-main">Executing atomic file operations...</tspan>
    </text>
    
    <text x="0" y="352" class="terminal-text">
      <tspan class="text-dim">       →</tspan> <tspan class="text-success">Created</tspan> <tspan class="text-file">database.py</tspan> <tspan class="text-dimmer">(18 lines)</tspan>
    </text>
    <text x="0" y="372" class="terminal-text">
      <tspan class="text-dim">       →</tspan> <tspan class="text-success">Created</tspan> <tspan class="text-file">models.py</tspan> <tspan class="text-dimmer">(24 lines)</tspan>
    </text>
    <text x="0" y="392" class="terminal-text">
      <tspan class="text-dim">       →</tspan> <tspan class="text-success">Created</tspan> <tspan class="text-file">schemas.py</tspan> <tspan class="text-dimmer">(32 lines)</tspan>
    </text>
    <text x="0" y="412" class="terminal-text">
      <tspan class="text-dim">       →</tspan> <tspan class="text-success">Created</tspan> <tspan class="text-file">crud.py</tspan> <tspan class="text-dimmer">(45 lines)</tspan>
    </text>
    <text x="0" y="432" class="terminal-text">
      <tspan class="text-dim">       →</tspan> <tspan class="text-success">Created</tspan> <tspan class="text-file">main.py</tspan> <tspan class="text-dimmer">(56 lines)</tspan>
    </text>

    <!-- Section: Reflection & Fix -->
    <text x="0" y="470" class="terminal-text">
      <tspan class="tag-check"> CHECK </tspan> <tspan class="text-main">Verifying codebase integrity...</tspan>
    </text>
    <text x="0" y="492" class="terminal-text">
      <tspan class="text-dim">       ⚠ </tspan><tspan class="tag-fix">Issue Detected:</tspan> <tspan class="text-dim">`crud.py` references `Session` but fails to import it.</tspan>
    </text>
    <text x="0" y="512" class="terminal-text">
      <tspan class="text-dim">       ↻ </tspan><tspan class="text-highlight">Auto-Fixing:</tspan> <tspan class="text-dim">Adding `from sqlalchemy.orm import Session` to `crud.py`</tspan>
    </text>
    <text x="0" y="532" class="terminal-text">
      <tspan class="text-dim">       ✓ </tspan><tspan class="text-success">Verification Passed</tspan>
    </text>

    <!-- Completion -->
    <text x="0" y="570" class="terminal-text">
      <tspan class="tag-info"> DONE </tspan> <tspan class="text-main">Project generated successfully in </tspan><tspan class="text-highlight">./todo_app</tspan> <tspan class="text-dim">(2.4s)</tspan>
    </text>

    <!-- New Prompt -->
    <text x="0" y="605" class="terminal-text">
      <tspan class="prompt-path">~/dev/workspace</tspan> <tspan class="prompt-arrow">❯</tspan> <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>
